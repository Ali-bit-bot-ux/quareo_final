<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — RetailPool AI</title>
<link rel="stylesheet" href="assets/style.css">
<style>
  .auth-section {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 2rem; padding-top: 7rem;
  }
  .auth-card {
    width: 100%; max-width: 440px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    backdrop-filter: blur(12px);
    padding: 2.5rem 2rem;
    position: relative;
    overflow: hidden;
  }
  .auth-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--signal), var(--violet), var(--signal));
    background-size: 200% 100%;
    animation: gradient-shift 4s ease infinite;
  }
  @keyframes gradient-shift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  .auth-header {
    text-align: center; margin-bottom: 2rem;
  }
  .auth-logo {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    font-family: var(--font-display); font-size: 20px; font-weight: 700;
    margin-bottom: 1.5rem; text-decoration: none; color: var(--text);
  }
  .auth-header h1 {
    font-size: 1.5rem; margin-bottom: 0.5rem;
  }
  .auth-header p {
    font-size: 14px; color: var(--text-dim);
  }
  .form-group {
    margin-bottom: 1.25rem;
  }
  .form-label {
    display: block;
    font-family: var(--font-mono); font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.12em; color: var(--text-faint); margin-bottom: 0.5rem;
  }
  .form-input {
    width: 100%;
    background: var(--bg-elevated); border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm); padding: 13px 16px;
    color: var(--text); font-size: 14px; outline: none;
    font-family: var(--font-body);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .form-input:focus {
    border-color: var(--signal-border);
    box-shadow: 0 0 0 3px var(--signal-dim);
  }
  .form-input::placeholder { color: var(--text-faint); }
  .form-error {
    display: none;
    margin-top: 0.75rem;
    padding: 10px 14px;
    background: var(--alert-dim);
    border: 1px solid rgba(255,92,92,0.35);
    border-radius: var(--radius-sm);
    font-size: 13px; color: var(--alert);
    font-family: var(--font-mono);
  }
  .form-error.visible { display: block; }
  .form-success {
    display: none;
    margin-top: 0.75rem;
    padding: 10px 14px;
    background: var(--signal-dim);
    border: 1px solid var(--signal-border);
    border-radius: var(--radius-sm);
    font-size: 13px; color: var(--signal);
    font-family: var(--font-mono);
  }
  .form-success.visible { display: block; }
  .auth-footer {
    text-align: center; margin-top: 1.5rem;
    font-size: 14px; color: var(--text-dim);
  }
  .auth-footer a {
    color: var(--signal); text-decoration: none;
    transition: opacity 0.15s;
  }
  .auth-footer a:hover { opacity: 0.8; }
  .btn-loading {
    position: relative;
    pointer-events: none;
    opacity: 0.7;
  }
  .btn-loading::after {
    content: '';
    position: absolute; right: 14px; top: 50%;
    width: 16px; height: 16px;
    margin-top: -8px;
    border: 2px solid rgba(6,21,12,0.3);
    border-top-color: #06150c;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">
    <span class="nav-logo-mark"></span>
    RetailPool AI
  </a>
  <div class="nav-links" id="navLinks">
    <a href="index.html" data-i="nav_home">Главная</a>
    <a href="scanner.html" data-i="nav_scanner">Сканер</a>
    <a href="pools.html" data-i="nav_pools">Пулы</a>
    <a href="pricing.html" data-i="nav_pricing">Тарифы</a>
  </div>
  <div class="nav-right">
    <div class="lang-switch">
      <button class="lang-btn active" data-lang="ru" onclick="rpSetLang('ru')">RU</button>
      <button class="lang-btn" data-lang="en" onclick="rpSetLang('en')">EN</button>
    </div>
    <a href="register.html" class="btn-nav-cta" data-i="nav_register">Регистрация</a>
    <button class="nav-burger" onclick="rpToggleMobileNav()" aria-label="Menu">☰</button>
  </div>
</nav>

<section class="auth-section">
  <div class="auth-card" data-reveal>
    <div class="auth-header">
      <a href="index.html" class="auth-logo">
        <span class="nav-logo-mark"></span>
        RetailPool AI
      </a>
      <h1 data-i="login_title">Вход в аккаунт</h1>
      <p data-i="login_sub">Войдите чтобы получить доступ к сканеру ниш и пулам закупок</p>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="loginEmail" data-i="label_email">Email</label>
        <input class="form-input" type="email" id="loginEmail" placeholder="you@company.kz" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="loginPassword" data-i="label_password">Пароль</label>
        <input class="form-input" type="password" id="loginPassword" placeholder="••••••••" required minlength="6" autocomplete="current-password">
      </div>
      <div class="form-error" id="loginError"></div>
      <button type="submit" class="btn btn-primary btn-block" id="loginBtn" style="margin-top:0.5rem;">
        <span data-i="login_btn">Войти</span>
      </button>
    </form>

    <div class="auth-footer">
      <span data-i="login_no_account">Нет аккаунта?</span>
      <a href="register.html" data-i="login_register_link">Зарегистрироваться</a>
    </div>
  </div>
</section>

<script src="assets/common.js"></script>
<script>
const PAGE_I18N = {
  ru: {
    nav_register: "Регистрация",
    login_title: "Вход в аккаунт",
    login_sub: "Войдите чтобы получить доступ к сканеру ниш и пулам закупок",
    label_email: "Email", label_password: "Пароль",
    login_btn: "Войти",
    login_no_account: "Нет аккаунта?",
    login_register_link: "Зарегистрироваться",
    login_error_wrong: "Неверный email или пароль",
    login_error_network: "Ошибка сети. Попробуйте снова.",
    login_success: "Успешный вход! Перенаправляем...",
  },
  en: {
    nav_register: "Sign up",
    login_title: "Sign in to your account",
    login_sub: "Sign in to access the niche scanner and co-buying pools",
    label_email: "Email", label_password: "Password",
    login_btn: "Sign in",
    login_no_account: "Don't have an account?",
    login_register_link: "Sign up",
    login_error_wrong: "Incorrect email or password",
    login_error_network: "Network error. Please try again.",
    login_success: "Login successful! Redirecting...",
  }
};
Object.keys(PAGE_I18N).forEach(l => Object.assign(RP_I18N[l], PAGE_I18N[l]));

// Redirect if already logged in
if (rpGetToken()) {
  window.location.href = 'scanner.html';
}

async function handleLogin(e) {
  e.preventDefault();
  const t = RP_I18N[RP_LANG];
  const btn = document.getElementById('loginBtn');
  const errorEl = document.getElementById('loginError');
  errorEl.classList.remove('visible');
  btn.classList.add('btn-loading');

  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;

  try {
    const resp = await fetch(RP_API_BASE + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });

    if (resp.ok) {
      const data = await resp.json();
      rpSetAuth(data.access_token, data.user);
      window.location.href = 'scanner.html';
    } else {
      const err = await resp.json().catch(() => ({}));
      errorEl.textContent = err.detail || t.login_error_wrong;
      errorEl.classList.add('visible');
    }
  } catch (e) {
    errorEl.textContent = t.login_error_network;
    errorEl.classList.add('visible');
  } finally {
    btn.classList.remove('btn-loading');
  }
}
</script>
</body>
</html>
