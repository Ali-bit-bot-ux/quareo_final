<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Регистрация — RetailPool AI</title>
<link rel="stylesheet" href="assets/style.css">
<style>
  .auth-section {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 2rem; padding-top: 7rem;
  }
  .auth-card {
    width: 100%; max-width: 440px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    backdrop-filter: blur(12px);
    padding: 2.5rem 2rem;
    position: relative;
    overflow: hidden;
  }
  .auth-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--signal), var(--violet), var(--signal));
    background-size: 200% 100%;
    animation: gradient-shift 4s ease infinite;
  }
  @keyframes gradient-shift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  .auth-header {
    text-align: center; margin-bottom: 2rem;
  }
  .auth-logo {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    font-family: var(--font-display); font-size: 20px; font-weight: 700;
    margin-bottom: 1.5rem; text-decoration: none; color: var(--text);
  }
  .auth-header h1 {
    font-size: 1.5rem; margin-bottom: 0.5rem;
  }
  .auth-header p {
    font-size: 14px; color: var(--text-dim);
  }
  .form-group { margin-bottom: 1.1rem; }
  .form-label {
    display: block;
    font-family: var(--font-mono); font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.12em; color: var(--text-faint); margin-bottom: 0.5rem;
  }
  .form-input {
    width: 100%;
    background: var(--bg-elevated); border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm); padding: 13px 16px;
    color: var(--text); font-size: 14px; outline: none;
    font-family: var(--font-body);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .form-input:focus {
    border-color: var(--signal-border);
    box-shadow: 0 0 0 3px var(--signal-dim);
  }
  .form-input::placeholder { color: var(--text-faint); }
  .form-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;
  }
  .form-error {
    display: none;
    margin-top: 0.75rem;
    padding: 10px 14px;
    background: var(--alert-dim);
    border: 1px solid rgba(255,92,92,0.35);
    border-radius: var(--radius-sm);
    font-size: 13px; color: var(--alert);
    font-family: var(--font-mono);
  }
  .form-error.visible { display: block; }
  .auth-footer {
    text-align: center; margin-top: 1.5rem;
    font-size: 14px; color: var(--text-dim);
  }
  .auth-footer a {
    color: var(--signal); text-decoration: none;
    transition: opacity 0.15s;
  }
  .auth-footer a:hover { opacity: 0.8; }
  .btn-loading {
    position: relative; pointer-events: none; opacity: 0.7;
  }
  .btn-loading::after {
    content: '';
    position: absolute; right: 14px; top: 50%;
    width: 16px; height: 16px; margin-top: -8px;
    border: 2px solid rgba(6,21,12,0.3);
    border-top-color: #06150c;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 500px) {
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-logo">
    <span class="nav-logo-mark"></span>
    RetailPool AI
  </a>
  <div class="nav-links" id="navLinks">
    <a href="index.html" data-i="nav_home">Главная</a>
    <a href="scanner.html" data-i="nav_scanner">Сканер</a>
    <a href="pools.html" data-i="nav_pools">Пулы</a>
    <a href="pricing.html" data-i="nav_pricing">Тарифы</a>
  </div>
  <div class="nav-right">
    <div class="lang-switch">
      <button class="lang-btn active" data-lang="ru" onclick="rpSetLang('ru')">RU</button>
      <button class="lang-btn" data-lang="en" onclick="rpSetLang('en')">EN</button>
    </div>
    <a href="login.html" class="btn-nav-cta" data-i="nav_login">Войти</a>
    <button class="nav-burger" onclick="rpToggleMobileNav()" aria-label="Menu">☰</button>
  </div>
</nav>

<section class="auth-section">
  <div class="auth-card" data-reveal>
    <div class="auth-header">
      <a href="index.html" class="auth-logo">
        <span class="nav-logo-mark"></span>
        RetailPool AI
      </a>
      <h1 data-i="reg_title">Создать аккаунт</h1>
      <p data-i="reg_sub">Зарегистрируйтесь и получите доступ к ИИ-радару по нишам Kaspi.kz</p>
    </div>

    <form id="registerForm" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label class="form-label" for="regName" data-i="label_name">Полное имя</label>
        <input class="form-input" type="text" id="regName" placeholder="Алексей Ким" required minlength="1" autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label" for="regEmail" data-i="label_email">Email</label>
        <input class="form-input" type="email" id="regEmail" placeholder="you@company.kz" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="regPassword" data-i="label_password">Пароль</label>
        <input class="form-input" type="password" id="regPassword" placeholder="Минимум 6 символов" required minlength="6" autocomplete="new-password">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="regCompany" data-i="label_company">Компания (необязательно)</label>
          <input class="form-input" type="text" id="regCompany" placeholder="ТОО «Ваша компания»" autocomplete="organization">
        </div>
        <div class="form-group">
          <label class="form-label" for="regPhone" data-i="label_phone">Телефон (необязательно)</label>
          <input class="form-input" type="tel" id="regPhone" placeholder="+7 777 123 4567" autocomplete="tel">
        </div>
      </div>
      <div class="form-error" id="regError"></div>
      <button type="submit" class="btn btn-primary btn-block" id="regBtn" style="margin-top:0.5rem;">
        <span data-i="reg_btn">Зарегистрироваться</span>
      </button>
    </form>

    <div class="auth-footer">
      <span data-i="reg_have_account">Уже есть аккаунт?</span>
      <a href="login.html" data-i="reg_login_link">Войти</a>
    </div>
  </div>
</section>

<script src="assets/common.js"></script>
<script>
const PAGE_I18N = {
  ru: {
    nav_login: "Войти",
    reg_title: "Создать аккаунт",
    reg_sub: "Зарегистрируйтесь и получите доступ к ИИ-радару по нишам Kaspi.kz",
    label_name: "Полное имя", label_email: "Email", label_password: "Пароль",
    label_company: "Компания (необязательно)", label_phone: "Телефон (необязательно)",
    reg_btn: "Зарегистрироваться",
    reg_have_account: "Уже есть аккаунт?",
    reg_login_link: "Войти",
    reg_error_exists: "Email уже зарегистрирован",
    reg_error_network: "Ошибка сети. Попробуйте снова.",
  },
  en: {
    nav_login: "Sign in",
    reg_title: "Create an account",
    reg_sub: "Sign up and get access to the AI niche radar for Kaspi.kz",
    label_name: "Full name", label_email: "Email", label_password: "Password",
    label_company: "Company (optional)", label_phone: "Phone (optional)",
    reg_btn: "Sign up",
    reg_have_account: "Already have an account?",
    reg_login_link: "Sign in",
    reg_error_exists: "Email already registered",
    reg_error_network: "Network error. Please try again.",
  }
};
Object.keys(PAGE_I18N).forEach(l => Object.assign(RP_I18N[l], PAGE_I18N[l]));

// Redirect if already logged in
if (rpGetToken()) {
  window.location.href = 'scanner.html';
}

async function handleRegister(e) {
  e.preventDefault();
  const t = RP_I18N[RP_LANG];
  const btn = document.getElementById('regBtn');
  const errorEl = document.getElementById('regError');
  errorEl.classList.remove('visible');
  btn.classList.add('btn-loading');

  const body = {
    full_name: document.getElementById('regName').value.trim(),
    email: document.getElementById('regEmail').value.trim(),
    password: document.getElementById('regPassword').value,
    company_name: document.getElementById('regCompany').value.trim() || null,
    phone: document.getElementById('regPhone').value.trim() || null,
  };

  try {
    const resp = await fetch(RP_API_BASE + '/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (resp.ok) {
      const data = await resp.json();
      rpSetAuth(data.access_token, data.user);
      window.location.href = 'scanner.html';
    } else {
      const err = await resp.json().catch(() => ({}));
      errorEl.textContent = err.detail || t.reg_error_exists;
      errorEl.classList.add('visible');
    }
  } catch (e) {
    errorEl.textContent = t.reg_error_network;
    errorEl.classList.add('visible');
  } finally {
    btn.classList.remove('btn-loading');
  }
}
</script>
</body>
</html>
